version: '3.9'
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "python -m http.server 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "node -e \"console.log('web placeholder')\""
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    depends_on:
      - api

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "python -c \"print('worker placeholder')\""
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseo}
      POSTGRES_USER: ${POSTGRES_USER:-pulseo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-change-me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
