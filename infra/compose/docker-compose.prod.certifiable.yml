version: '3.9'
services:
  caddy:
    image: caddy:2.8
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../caddy/site:/srv/site:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile.runtime
    env_file:
      - /etc/pulseo/prod.env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    volumes:
      - /opt/pulseo/archive:/opt/pulseo/archive

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: python services/worker/worker.py
    env_file:
      - /etc/pulseo/prod.env
    volumes:
      - ../../:/app
      - /opt/pulseo/archive:/opt/pulseo/archive
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    env_file:
      - /etc/pulseo/prod.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
