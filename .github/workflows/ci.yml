name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install YAML dependency
        run: pip install pyyaml

      - name: Validate OpenAPI file
        run: bash scripts/validate-openapi.sh

  api-import-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        run: pip install -r services/api/requirements.txt

      - name: Import FastAPI app
        run: python -c "from services.api.app import app; print(app.title)"
