name: validate-socle

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/validate-socle.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: |
          set -euo pipefail
          find infra/scripts -type f -name "*.sh" -print0 | while IFS= read -r -d '' file; do
            bash -n "$file"
          done

      - name: Validate JSON manifests
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in Path("infra/manifests").glob("*.json"):
              with path.open("r", encoding="utf-8") as f:
                  json.load(f)
              print(f"OK {path}")
          PY

      - name: Ensure validation-only pack
        run: |
          set -euo pipefail

          forbidden='systemctl restart|systemctl stop|rm -rf|apt install|ufw allow|ufw delete|iptables -A|nft add'
          if grep -R -E "$forbidden" .github/workflows infra/manifests 2>/dev/null; then
            echo "Forbidden operational command detected in validation-only area"
            exit 1
          fi

          echo "OK validation-only"
